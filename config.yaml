models:
  sweep:
    - llama3.3-70b-instruct
    - openai-gpt-oss-120b
    - openai-gpt-oss-20b
    - deepseek-r1-distill-llama-70b
  default_a: "openai-gpt-oss-120b"
  default_b: "openai-gpt-oss-20b"

inference:
  temperature: 0.0   # Deterministic outputs. At higher temp, format error rate spikes.
  max_tokens: 512    # Increased from 256: 120b produces verbose reasoning (~146 tokens avg),
                     # and truncation at 256 caused ALL 33 parse errors (every error was exactly
                     # 256 tokens — max_tokens hit). 512 costs ~$0.00004 extra per call vs the
                     # benefit of eliminating a 7.2% error rate. Label-first schema also guards
                     # against truncation: label is emitted before reasoning.
  prompt_version: "v1"
  concurrency: 10    # Runtime override via CONCURRENCY env var

github:
  repo: "digitalocean/doctl"
  per_page: 100

pricing:
  # Per 1M tokens — input and output priced SEPARATELY.
  # These are reference rates; verify current pricing at https://inference.do-ai.run/v1/models
  # before a production run. The RunManifest captures the snapshot used for each run.
  anthropic-claude-haiku-4.5:
    input: 1.00
    output: 5.00
  llama3.3-70b-instruct:
    input: 0.65
    output: 0.65
  openai-gpt-oss-120b:
    input: 0.10
    output: 0.70
  openai-gpt-oss-20b:
    input: 0.05
    output: 0.45
  deepseek-r1-distill-llama-70b:
    input: 0.65
    output: 0.65
